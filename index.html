---
layout: default
---

    <div id="post-list">
        <script type="text/javascript">
        var gallery_item_array = new Object(),
            site_base_url = "{{ site.baseurl }}";
        </script>

        {% for post in site.posts %}

        {% assign postid = post.title | downcase | replace: ' ', '-' | replace: '.', '' | replace: ',', '' %}

        <script type="text/javascript">
            gallery_item_array["{{postid}}"] = {
                "features": {{ post.features | jsonify}},
                "date": "{{ post.date | date: "%Y-%m-%d" }}"
            };
        </script>


        <ul class="metadata meta-item">
            <li class="pagetitle"><h1><a class="{{ postid }}" href="{{ post.url }}">{{ post.title }}</a></h1></li>
            <li class="categories">
                {{ post.categories | join: ", " }}
            </li>
            <li>{{ post.date | date_to_string }}</li>
        </ul>
        {% endfor %}
    </div>

    <div class="gallery col-lg-8 col-md-8 col-sm-8 hidden-xs --trim-padding">
        <div class="caption">
        </div>
        <script type="text/javascript">
            build_gallery(gallery_item_array, '.gallery');
        </script>
    </div>
