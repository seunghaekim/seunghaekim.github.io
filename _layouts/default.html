<!DOCTYPE html>
<html>
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} – {{ site.description }}</title>

    <link href="{{ site.baseurl }}/style.css" rel="stylesheet" type="text/css">

    <script src="http://ajax.aspnetcdn.com/ajax/jQuery/jquery-3.1.1.min.js"></script>

    <!-- fullpage.js -->
    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/assets/fullPage.js-master/jquery.fullPage.css" />
    <script type="text/javascript" src="{{ site.baseurl }}/assets/fullPage.js-master/jquery.fullPage.js"></script>

    <!-- slick -->
    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/assets/slick/slick.css"/>
    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/assets/slick/custom-theme.css"/>

      <script type="text/javascript" src="{{ site.baseurl }}/assets/js/scripts.js"></script>
    {% include meta.html %}

    <!--[if lt IE 9]>
      <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" />

    <!-- Created with Jekyll Now - http://github.com/barryclark/jekyll-now -->
  </head>

  <body>
  {{ content }}
  {% include analytics.html %}

  <!-- slick setting -->
  <script type="text/javascript" src="{{ site.baseurl }}/assets/slick/slick.min.js"></script>

  <script type="text/javascript">
    $(document).ready(function(){
      $('.gallery-contents').slick({
          dots: true,
          infinite: true,
          speed: 300,
          slidesToShow: 1,
          centerMode: true,
          variableWidth: true
      });
    });
  </script>
  </body>
</html>
